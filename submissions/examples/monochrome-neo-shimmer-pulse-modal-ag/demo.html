<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monochrome Neo Shimmer Pulse Modal</title>

    <!-- Premium Google Fonts for Monochrome Brutalist Aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="matrix-deck">
      <!-- Matrix Header -->
      <header class="matrix-header">
        <h1 class="matrix-title">NEO-OPERATIONAL MATRIX</h1>
        <p class="matrix-subtitle">Pure CSS Shimmer Pulse Modal // v1.0.0</p>
      </header>

      <!-- Trigger action -->
      <section style="margin-bottom: 40px">
        <a href="#neo-modal" class="neo-trigger-btn"> INITIALIZE MODAL </a>
      </section>

      <!-- Customizer Dashboard -->
      <section class="control-panel">
        <h2 class="control-header">// LIVE PARAMETER CONTROLS</h2>

        <div class="control-grid">
          <!-- Scale Transition Duration -->
          <div class="control-group">
            <label class="control-label" for="duration">
              <span>Modal Duration</span>
              <span id="duration-val" class="control-value">0.45s</span>
            </label>
            <input
              type="range"
              id="duration"
              class="control-slider"
              min="0.1"
